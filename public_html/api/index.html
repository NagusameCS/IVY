<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>View Counter</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .counter-box {
      background: white;
      padding: 2em;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      margin-bottom: 0.5em;
    }
    .loading {
      font-style: italic;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="counter-box">
    <h1>ðŸ“Š Site Views</h1>
    <div id="counter" class="loading">Loading...</div>
  </div>

  <script>
    fetch('/api/application.py') // This must match the URL path to your Python script
      .then(res => res.text())
      .then(data => {
        document.getElementById('counter').textContent = data;
      })
      .catch(err => {
        document.getElementById('counter').textContent = "Error loading counter.";
        console.error(err);
      });
  </script>
</body>
</html>
