    <style>
        :root { --primary:#1a202c; --accent:#E4EEE9; --pillbg:#B7D2C0; --pillhover:#9fc2ad; }
        body { font-family:'Space Grotesk',sans-serif; background:#f8fafc; color:var(--primary); }
        body.dark-mode { background:#181818; color:#f0f0f0; }

        .menu-button { position:fixed;top:20px;left:20px;z-index:1000;background:transparent;border:none;border-radius:8px;width:40px;height:40px;display:flex;justify-content:center;align-items:center;cursor:pointer; }
        .menu-button:hover { background:transparent; }
        .menu-button .line { width:20px;height:2px;background:#1a202c;position:absolute;transition:all .3s ease;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1001; }
        .menu-button .line::before,.menu-button .line::after { content:'';position:absolute;width:20px;height:2px;background:#1a202c;transition:all .3s ease;left:0; }
        body.dark-mode .menu-button .line, body.dark-mode .menu-button .line::before, body.dark-mode .menu-button .line::after { background:#f0f0f0; }
        .menu-button .line::before { transform:translateY(-8px); }
        .menu-button .line::after { transform:translateY(8px); }
        .menu-button.active .line { background:transparent!important; }
        .menu-button.active .line::before { transform:rotate(45deg); }
        .menu-button.active .line::after { transform:rotate(-45deg); }

        .sidebar { position:fixed;top:0;left:-280px;width:280px;height:100%;background:#fff;z-index:999;transition:left .3s ease;box-shadow:2px 0 10px rgba(0,0,0,.1);display:flex;flex-direction:column; }
        .sidebar.active { left:0; }
        .sidebar-content { padding:80px 20px 20px;flex:1;overflow-y:auto; }
        .nav-menu { display:flex;flex-direction:column;gap:4px; }
        .nav-menu-item { display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;text-decoration:none;color:var(--primary);font-size:.95rem;transition:background .2s ease; }
        .nav-menu-item:hover { background:#f0f0f0; }
        .sidebar-footer { padding:20px;border-top:1px solid #e2e8f0; }
        body.dark-mode .sidebar { background:#242424; }
        body.dark-mode .nav-menu-item { color:#f0f0f0; }
        body.dark-mode .nav-menu-item:hover { background:#333; }
        body.dark-mode .sidebar-footer { border-top-color:#3a3a3a; }

        .hero-section { position:relative;border-radius:20px;margin-bottom:3rem;overflow:hidden;min-height:340px;display:flex;align-items:flex-end; }
        .hero-carousel { position:absolute;inset:0;z-index:0; }
        .hero-carousel img { position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.5s ease-in-out; }
        .hero-carousel img.active { opacity:1; }
        .hero-gradient-overlay { position:absolute;inset:0;z-index:1;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.65) 45%,rgba(0,0,0,.35) 100%);border-radius:20px; }
        .hero-inner { position:relative;z-index:2;color:#fff;padding:2.5rem 2rem;width:100%; }
        .hero-section::after { content:none; }
        .feature-card { background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:2rem;transition:all .2s; }
        .feature-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.06);transform:translateY(-2px); }
        body.dark-mode .feature-card { background:#242424;border-color:#3a3a3a; }
        .cta-card { background:linear-gradient(135deg,#39a95d,#2d8a4e);border-radius:16px;padding:2.5rem;color:#fff;text-align:center; }
        .step-number { width:48px;height:48px;border-radius:50%;background:var(--pillbg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.25rem;flex-shrink:0; }
        body.dark-mode .step-number { background:#333;color:#4ade80; }
        .faq-item { border-bottom:1px solid #e2e8f0;padding:1.25rem 0; }
        body.dark-mode .faq-item { border-bottom-color:#3a3a3a; }
        .faq-item summary { cursor:pointer;font-weight:600;list-style:none;display:flex;align-items:center;justify-content:space-between; }
        .faq-item summary::-webkit-details-marker { display:none; }
        .faq-item[open] summary .faq-arrow { transform:rotate(180deg); }
        .faq-arrow { transition:transform .2s; }

        .dark-mode-toggle { background:none;border:none;cursor:pointer;padding:8px;border-radius:8px;transition:background .2s; }
        .dark-mode-toggle:hover { background:rgba(0,0,0,.05); }
        body.dark-mode .dark-mode-toggle:hover { background:rgba(255,255,255,.05); }
        
        /* Performance optimizations */
        * { box-sizing:border-box; }
        img { loading:lazy; decoding:async; }
        .animate { will-change:transform; }
        
        /* Reduced motion for accessibility */
        @media (prefers-reduced-motion: reduce) {
            * { animation-duration:0.01ms!important; animation-iteration-count:1!important; transition-duration:0.01ms!important; }
        }
        
        /* High contrast support */
        @media (prefers-contrast: high) {
            .feature-card { border:2px solid var(--primary); }
            body.dark-mode .feature-card { border-color:#f0f0f0; }
        }
    </style>
